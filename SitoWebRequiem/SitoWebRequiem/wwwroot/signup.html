<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Registrazione</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
</head>
<body>

    <div class="container">
        <h1>Registrati</h1>

        <input type="text" id="su_username" placeholder="Nome utente">
        <input type="password" id="su_password" placeholder="Password">

        <button onclick="signup()">Crea Account</button>

        <p id="error" class="error"></p>

        <p class="switch">
            Hai già un account?
            <a href="login.html">Accedi</a>
        </p>
    </div>

</body>
</html>
